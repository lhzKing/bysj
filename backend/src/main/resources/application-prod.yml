spring:
  datasource:
    url: ${TRACE_DB_URL:}
    username: ${TRACE_DB_USERNAME:}
    password: ${TRACE_DB_PASSWORD:}

jwt:
  secret: ${TRACE_JWT_SECRET:}

cors:
  allowed-origins: ${TRACE_CORS_ALLOWED_ORIGINS:}
  allowed-origin-patterns: ${TRACE_CORS_ALLOWED_ORIGIN_PATTERNS:}
  allow-credentials: ${TRACE_CORS_ALLOW_CREDENTIALS:true}

logging:
  level:
    com.example.trace.security: ${TRACE_SECURITY_LOG_LEVEL:WARN}

trace:
  signature:
    private-key-path: ${TRACE_SIGNATURE_PRIVATE_KEY_PATH:}
    public-key-path: ${TRACE_SIGNATURE_PUBLIC_KEY_PATH:}
    key-id: ${TRACE_SIGNATURE_KEY_ID:}
    key-version: ${TRACE_SIGNATURE_KEY_VERSION:}
    auto-generate: ${TRACE_SIGNATURE_AUTO_GENERATE:false}
  demo-data:
    enabled: ${TRACE_DEMO_DATA_ENABLED:false}
  qr:
    # prod 必须通过环境变量 TRACE_PUBLIC_BASE_URL 注入前端真实域名（含 scheme，不含尾部斜杠），例如 https://trace.example.com。
    # 空字符串=回退为裸 traceCode 载荷（与历史一致，但失去手机原生扫码跳转能力）。
    public-base-url: ${TRACE_PUBLIC_BASE_URL:}
