# 用法见同目录 README.md
#
# 架构（部署到现有 Azure 日本服务器，复用 1Panel + OpenResty + Cloudflare）：
#
#   Cloudflare DNS (trace.coldhz.codes, trace-api.coldhz.codes)
#         │  HTTPS（CF 边缘证书 + 源站 CF 15 年证书）
#         ▼
#   1Panel / OpenResty （宿主机 :443）
#         │  反代到下面两个 compose 暴露的本地端口
#         ├─► frontend  127.0.0.1:18080  → 容器内 nginx :80 → /srv/dist
#         └─► backend   127.0.0.1:18081  → 容器内 spring-boot :8080
#                              │
#                              ├─► mysql （内部网络）
#                              └─► redis （内部网络）
#
# 端口选择 18080/18081 是为了避开 1Panel(23562)、new-api(5000)、SSH(9683) 等已占用端口。
# 如果与你机器上其它服务冲突，自行改 deploy/.env 里的 HOST_FRONTEND_PORT / HOST_BACKEND_PORT。

services:
  mysql:
    image: mysql:8.0
    container_name: trace-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${TRACE_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${TRACE_DB_NAME}
      MYSQL_USER: ${TRACE_DB_USERNAME}
      MYSQL_PASSWORD: ${TRACE_DB_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    # 不对外暴露 3306，仅 compose 内部网络访问
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${TRACE_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: trace-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${TRACE_REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${TRACE_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: trace-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TRACE_DB_URL: jdbc:mysql://mysql:3306/${TRACE_DB_NAME}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      TRACE_DB_USERNAME: ${TRACE_DB_USERNAME}
      TRACE_DB_PASSWORD: ${TRACE_DB_PASSWORD}
      TRACE_REDIS_HOST: redis
      TRACE_REDIS_PORT: 6379
      TRACE_REDIS_PASSWORD: ${TRACE_REDIS_PASSWORD}
      TRACE_JWT_SECRET: ${TRACE_JWT_SECRET}
      TRACE_SIGNATURE_PRIVATE_KEY_PATH: /app/keys/private.pem
      TRACE_SIGNATURE_PUBLIC_KEY_PATH: /app/keys/public.pem
      TRACE_SIGNATURE_AUTO_GENERATE: "false"
      # prod guard 必填：密钥元数据（用于审计 + 未来轮换）
      TRACE_SIGNATURE_KEY_ID: ${TRACE_SIGNATURE_KEY_ID}
      TRACE_SIGNATURE_KEY_VERSION: ${TRACE_SIGNATURE_KEY_VERSION}
      # 前端实际访问域名（HTTPS），用于 CORS 校验
      TRACE_CORS_ALLOWED_ORIGINS: ${TRACE_CORS_ALLOWED_ORIGINS}
      TRACE_CORS_ALLOWED_ORIGIN_PATTERNS: ${TRACE_CORS_ALLOWED_ORIGIN_PATTERNS}
      # 手机扫码跳转的公开溯源页基址（=前端域名）
      TRACE_PUBLIC_BASE_URL: ${TRACE_PUBLIC_BASE_URL}
      TRACE_SECURITY_LOG_LEVEL: WARN
      # 演示数据管理接口（seed-master / generate-sample / clear-trace）开关。
      # prod profile 默认禁用，需要灌 demo 数据时临时设为 true，演示完务必改回 false。
      TRACE_DEMO_DATA_ENABLED: ${TRACE_DEMO_DATA_ENABLED:-false}
      TRACE_DEMO_DATA_MAX_GENERATE_COUNT: ${TRACE_DEMO_DATA_MAX_GENERATE_COUNT:-500}
    volumes:
      - ./keys:/app/keys:ro
    ports:
      # 只绑定到 127.0.0.1，外网不可直连，必须经 OpenResty 反代
      - "127.0.0.1:${HOST_BACKEND_PORT:-18081}:8080"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # 注意：前端是相对路径 /api，所以这里不需要注入 API_BASE
        VITE_AMAP_KEY: ${VITE_AMAP_KEY}
    container_name: trace-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${HOST_FRONTEND_PORT:-18080}:80"
