# 前端容器内 nginx —— 只做 SPA 静态托管 + history 路由回退
# HTTPS / 反向代理 /api 都由宿主机 1Panel 的 OpenResty 负责
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA 路由回退
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 静态资源加长缓存（Vite 构建产物带 hash）
  location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
